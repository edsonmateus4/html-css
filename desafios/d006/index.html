<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista com significados</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>
        Em HTML 5, podemos inserir os elementos da lista a seguir, passa a seta em casa item para descobrir quando usar determinada tag dependendo da situação. 
    </p>
    <ol type="1">
        <li><abbr title="Utilize <a></a>">Link</abbr></li>
        <li><abbr title="Utilize <p></p>">Parágrafo</abbr></li>
        <li><abbr title="Utilize <strong></strong>">Negrito/ Ênfase</abbr></li>
    </ol>
</body>
</html>
